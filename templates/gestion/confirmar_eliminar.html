{% extends "gestion/base.html" %}
{% block title %}{{ titulo }} — PowerRent{% endblock %}
{% block gestion_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle-fill me-2"></i>{{ titulo }}</h5>
            </div>
            <div class="card-body text-center py-4">
                <i class="bi bi-trash3 text-danger" style="font-size: 3rem;"></i>
                <p class="mt-3 fs-5">¿Estás seguro de eliminar:</p>
                <p class="fw-bold fs-5 text-danger">"{{ objeto }}"</p>
                <p class="text-muted">Esta acción no se puede deshacer.</p>
            </div>
            <div class="card-footer d-flex justify-content-between">
                <a href="{{ volver_url }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Cancelar
                </a>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash3 me-1"></i> Sí, Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
