version: '3.9'

services:

  # Base de datos PostgreSQL 15
  db:
    image: postgres:15-alpine
    container_name: powerrent_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: powerrent_db
      POSTGRES_USER: powerrent_user
      POSTGRES_PASSWORD: powerrent_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerrent_user -d powerrent_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Aplicación Django
  web:
    build: .
    container_name: powerrent_web
    restart: unless-stopped
    # entrypoint.sh espera a PostgreSQL, aplica migraciones y luego ejecuta este comando
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: powerrent.settings.development
      SECRET_KEY: django-insecure-powerrent-dev-key-change-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DB_NAME: powerrent_db
      DB_USER: powerrent_user
      DB_PASSWORD: powerrent_pass
      DB_HOST: db
      DB_PORT: "5432"
      EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
      # Para ngrok u otros tuneles, agrega tu URL aquí:
      # CSRF_TRUSTED_ORIGINS: "https://tu-subdominio.ngrok-free.app"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_volume:
  static_volume:
